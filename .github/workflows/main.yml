name: Deploy to Netlify

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Hugo
        uses: kevvurs/action-hugo@v1.0-rc2
        with:
          hugo-version: latest
      - name: Build with Hugo
        run: hugo
      - name: Deploy to Netlify
        uses: South-Paw/action-netlify-cli@2.0.0
        with:
          args: deploy
          token: ${{ secrets.NETLIFY_AUTH_TOKEN }}
